name: BridgeZeroMobile
options:
  bundleIdPrefix: arc.omega
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.2.0
targets:
  BridgeZeroMobile:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Bridge Zero
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: Connect to your OMEGA-ARC Core Runtime on the local network.
        NSFaceIDUsageDescription: Confirm sensitive Bridge Zero operator actions.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: arc.omega.bridgezero.mobile
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: true
    scheme:
      testTargets:
        - BridgeZeroMobileTests
        - BridgeZeroMobileUITests
  BridgeZeroMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: BridgeZeroMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: arc.omega.bridgezero.mobile.tests
  BridgeZeroMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: BridgeZeroMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: arc.omega.bridgezero.mobile.uitests
